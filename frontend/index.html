<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive IDS - BOCD Explorer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-scale-chromatic@3"></script>
</head>
<body>
    <header>
        <h1>Interactive Intrusion Detection System</h1>
        <div id="status-bar">
            <span id="status-dataset">Dataset: --</span>
        </div>
    </header>

    <div class="dashboard">
        <!-- Sidebar Controls -->
        <aside id="controls-panel">
            <section class="control-group">
                <h3>Day Selection</h3>
                <div id="day-selector" class="btn-group"></div>
            </section>

            <section class="control-group">
                <h3>Feature</h3>
                <select id="feature-selector"></select>
            </section>

            <section class="control-group">
                <h3>Bin Size</h3>
                <select id="bin-size-selector">
                    <option value="100">100 rows (fine)</option>
                    <option value="500">500 rows</option>
                    <option value="1000" selected>1000 rows (default)</option>
                    <option value="2000">2000 rows</option>
                    <option value="5000">5000 rows (coarse)</option>
                </select>
            </section>

            <section class="control-group">
                <h3>BOCD Parameters</h3>
                <label>
                    Hazard Rate: <span id="hazard-display">1/200</span>
                    <input type="range" id="hazard-slider" min="1" max="100" value="50">
                </label>
                <label>
                    CP Threshold: <span id="threshold-display">0.30</span>
                    <input type="range" id="threshold-slider" min="5" max="95" value="30">
                </label>
            </section>


            <section class="control-group">
                <h3>Feature Ranking</h3>
                <div id="feature-ranking"></div>
            </section>
        </aside>

        <!-- Main Content -->
        <main>
            <div id="timeseries-container" class="chart-panel">
                <h3>Network Traffic Time Series</h3>
                <div id="timeseries-chart"></div>
            </div>

            <div class="bottom-row">
                <div id="heatmap-container" class="chart-panel">
                    <h3>PPD Heatmap</h3>
                    <div id="heatmap-chart"></div>
                </div>

                <div id="network-container" class="chart-panel">
                    <h3>Network Topology</h3>
                    <div id="network-chart"></div>
                    <div id="attack-summary"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span>Computing...</span>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
